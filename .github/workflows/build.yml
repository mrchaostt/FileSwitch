name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 5.15.2
          arch: win64_mingw81

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cd build
          cmake --build . --config Release

      - name: Deploy Qt and MinGW Runtime
        run: |
          cd build
          windeployqt --no-translations FileSwitch.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileSwitch-Windows
          path: |
            build/FileSwitch.exe
            build/*.dll
            build/qt.conf
